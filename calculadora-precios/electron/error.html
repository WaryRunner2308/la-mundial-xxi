<!DOCTYPE html>
<html>
<head>
    <title>Error - La Mundial</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fefefe;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 { color: #e74c3c; }
        p { font-size: 1.2rem; margin-top: 1rem; }
        .retry-button {
            margin-top: 2rem;
            padding: 0.75rem 1.5rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        .retry-button:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Error de Carga</h1>
        <p>No se pudo conectar al servidor de desarrollo.</p>
        <p>Asegúrate de que el frontend esté ejecutándose en http://localhost:5173</p>
        <button class="retry-button" onclick="location.reload()">Reintentar</button>
    </div>
</body>
</html>
